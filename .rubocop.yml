AllCops:
  TargetRubyVersion: 3.1
  NewCops: disable
  SuggestExtensions: false
  Exclude:
    - test/fixtures/**/*       # Synthetic Rails-shaped fixtures aren't ours to police.

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

# This is a documentation parser. Walking RDoc's API and emitting
# normalized records inherently produces longer-than-default methods
# and a wider Writer class. Raise the thresholds to plausible levels
# instead of fragmenting the code purely to satisfy an arbitrary count.
Metrics/MethodLength:
  Max: 50
  Exclude:
    - test/**/*

Metrics/ClassLength:
  Max: 500
  Exclude:
    - test/**/*

Metrics/AbcSize:
  Max: 35
  Exclude:
    - test/**/*

Metrics/CyclomaticComplexity:
  Max: 15
  Exclude:
    - test/**/*

Metrics/PerceivedComplexity:
  Max: 15
  Exclude:
    - test/**/*
